name: Codex Autofix (Reusable)

# Shared infrastructure for the Codex autofix loop — called by individual repos
# that want the same triggers / permissions / concurrency / Claude action config.
# Each repo supplies its own prompt so behaviour stays auditable in-repo.
#
# To onboard a new repo:
#   1. Make sure the repo has DEEPSEEK_API_KEY and (optionally) GH_PAT secrets.
#      (Routed through DeepSeek's Anthropic-compatible endpoint — see the action step.)
#   2. Create .github/workflows/codex-autofix.yml following the caller template in
#      this repo's AGENTS.md or the existing Socratic Trade / Congress.Trade examples.
#   3. Caller workflows should trigger on `pull_request_review` with
#      `types: [submitted]` plus `workflow_dispatch` only. Do not trigger on
#      pull_request_review_comment or issue_comment; one Codex review can contain
#      many comments, and comment events can fan out into autofix storms.
#
# Org-level alternative (preferred):
#   Move this file to jaywedgeworth22/.github/workflows/codex-autofix-reusable.yml
#   and call it as jaywedgeworth22/.github/workflows/codex-autofix-reusable.yml@main.
#   See docs/how-to-setup-org-dot-github.md for setup steps.

on:
  workflow_call:
    inputs:
      prompt:
        required: true
        type: string
        description: "Full prompt for the Claude autofix agent"
      claude_args:
        required: false
        type: string
        default: |
          --max-turns 60
          --allowedTools "Edit,Write,Read,Bash"
        description: "Extra CLI args passed to claude-code-action"
      allowed_bots:
        required: false
        type: string
        default: "chatgpt-codex-connector,chatgpt-codex-connector[bot]"
        description: "Allowed bot actors (normalised by the action: lowercased, [bot] stripped)"
    secrets:
      DEEPSEEK_API_KEY:
        required: true
      GH_PAT:
        required: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  autofix:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - uses: anthropics/claude-code-action@v1
        # Routed to DeepSeek via its Anthropic-compatible endpoint to control cost:
        # claude-code-action drives the Claude Code CLI, which honors
        # ANTHROPIC_BASE_URL / _AUTH_TOKEN / _MODEL, so this bills the DeepSeek key
        # instead of Anthropic. Revert by removing this env block and pointing
        # anthropic_api_key back at an ANTHROPIC_API_KEY secret.
        env:
          ANTHROPIC_BASE_URL: https://api.deepseek.com/anthropic
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.DEEPSEEK_API_KEY }}
          ANTHROPIC_MODEL: deepseek-v4-flash
          ANTHROPIC_SMALL_FAST_MODEL: deepseek-v4-flash
        with:
          anthropic_api_key: ${{ secrets.DEEPSEEK_API_KEY }}
          github_token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          allowed_bots: ${{ inputs.allowed_bots }}
          prompt: ${{ inputs.prompt }}
          claude_args: ${{ inputs.claude_args }}
          # claude-code-action's buffered-inline-comment classifier hardcodes
          # https://api.anthropic.com and reads anthropic_api_key directly,
          # ignoring ANTHROPIC_BASE_URL — with a DeepSeek key it would 401 and
          # fall back to posting every buffered comment unfiltered. Disable the
          # feature rather than rely on a classifier that can't authenticate.
          classify_inline_comments: "false"
