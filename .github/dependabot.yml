version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    ignore:
      # Keep the type floor pinned to the runtime floor in engines.node (>=20).
      # Letting @types/node drift to a newer major silently type-checks the
      # package against APIs that do not exist on the oldest supported Node.
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
